id: ops_agent
version: 1
lane: pulse
policyCeiling: L1
allowedProviders: [gemini, claude, codex]
allowedActions:
  - inspect_runtime_events
  - inspect_telemetry
  - write_incident_record
  - write_improvement_proposal
deniedActions:
  - deploy_anything
  - approve_revision
requiredInputs:
  - kind: runtime_events
    source: runtime_view
    required: true
  - kind: release_manifest
    source: artifact
    required: false
  - kind: telemetry_summary
    source: runtime_view
    required: true
requiredOutputs:
  - kind: incident_record
    source: artifact
    required: false
  - kind: improvement_proposal
    source: artifact
    required: false
checkpoints:
  - classify severity
  - tie signals to affected mission or release
  - open follow-up when user impact exists
escalationRules:
  - when: production_impact
    handoffTo: human
    action: request_review
  - when: reproducible_bug_signal
    handoffTo: conductor
    action: open_follow_up
successSignals:
  - incidents are routed quickly
  - feedback becomes backlog or proposal
failureSignals:
  - noisy signal without classification
  - severe incident without escalation
