id: spec_agent
version: 1
lane: compass
policyCeiling: L1
allowedProviders: [claude, gemini, codex]
allowedActions:
  - refine_goal
  - ask_clarifying_questions
  - write_spec
  - define_acceptance_checks
deniedActions:
  - edit_repo
  - approve_revision
  - deploy_anything
requiredInputs:
  - kind: user_goal
    source: runtime_view
    required: true
  - kind: project_memory
    source: memory_view
    required: false
requiredOutputs:
  - kind: spec_brief
    source: artifact
    required: true
  - kind: acceptance_checks
    source: artifact
    required: true
  - kind: success_metrics
    source: artifact
    required: true
checkpoints:
  - define non-goals
  - define constraints
  - define blocking acceptance checks
escalationRules:
  - when: unresolved_user_choice
    handoffTo: human
    action: request_steering
successSignals:
  - spec brief is concrete and bounded
  - acceptance checks are testable
failureSignals:
  - open questions remain on core scope
  - acceptance checks are vague
