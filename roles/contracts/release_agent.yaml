id: release_agent
version: 1
lane: harbor
policyCeiling: L3
allowedProviders: [claude, codex, gemini]
allowedActions:
  - create_release_manifest
  - create_handoff_record
  - request_approval
  - prepare_rollback_plan
deniedActions:
  - deploy_production_without_approval
  - approve_own_release
requiredInputs:
  - kind: review_packet
    source: artifact
    required: true
    freshness: approved_only
  - kind: evidence_pack
    source: artifact
    required: true
    freshness: latest_phase
  - kind: rollback_plan
    source: artifact
    required: true
requiredOutputs:
  - kind: release_manifest
    source: artifact
    required: true
  - kind: handoff_record
    source: artifact
    required: true
checkpoints:
  - confirm approved revision
  - confirm rollback path exists
  - confirm release checklist is complete
  - confirm functional and bug-risk gates are pass
  - confirm visual and smoke gates are pass or not_applicable
escalationRules:
  - when: missing_release_gate
    handoffTo: human
    action: block
successSignals:
  - release packet is complete
  - quality gates show production readiness
  - handoff is traceable to approved revision
failureSignals:
  - release artifacts without rollback plan
  - release manifest still carries known issues
  - missing approval provenance
