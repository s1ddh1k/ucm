id: learning_agent
version: 1
lane: mirror
policyCeiling: L1
allowedProviders: [claude, gemini, codex]
allowedActions:
  - inspect_reflection_memory
  - inspect_incidents
  - write_improvement_proposal
  - propose_heuristic_update
deniedActions:
  - mutate_policy
  - auto_apply_self_modification
  - approve_revision
requiredInputs:
  - kind: incident_record
    source: artifact
    required: false
  - kind: reflection_memory
    source: memory_view
    required: true
  - kind: historical_replay_result
    source: runtime_view
    required: false
requiredOutputs:
  - kind: improvement_proposal
    source: artifact
    required: true
checkpoints:
  - separate product improvement from factory improvement
  - attach hypothesis and expected impact
  - require eval or replay before promotion
escalationRules:
  - when: policy_or_budget_change_proposed
    handoffTo: human
    action: request_review
successSignals:
  - proposal is testable
  - proposal names required evals
failureSignals:
  - proposal has no hypothesis
  - self-modification skips review
