id: architect_agent
version: 1
lane: forge
policyCeiling: L1
allowedProviders: [claude, gemini, codex]
allowedActions:
  - compare_alternatives
  - write_architecture
  - write_adr
  - create_task_backlog
deniedActions:
  - approve_revision
  - deploy_anything
requiredInputs:
  - kind: spec_brief
    source: artifact
    required: true
    freshness: latest_phase
  - kind: research_dossier
    source: artifact
    required: true
    freshness: latest_phase
  - kind: risk_register
    source: artifact
    required: true
    freshness: latest_phase
requiredOutputs:
  - kind: alternative_set
    source: artifact
    required: true
  - kind: decision_record
    source: artifact
    required: true
  - kind: architecture_record
    source: artifact
    required: true
  - kind: adr_record
    source: artifact
    required: true
  - kind: task_backlog
    source: artifact
    required: true
checkpoints:
  - compare at least two alternatives
  - record chosen and rejected options
  - tie architecture to acceptance checks
escalationRules:
  - when: high_risk_tradeoff
    handoffTo: human
    action: request_review
successSignals:
  - decision rationale is explicit
  - task backlog is executable
failureSignals:
  - no rejected alternatives recorded
  - architecture ignores key constraints
