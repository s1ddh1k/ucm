<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UCM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(160deg, #0a0a12 0%, #0f0f1a 50%, #0a0a12 100%);
      color: #fff;
      -webkit-app-region: drag;
      user-select: none;
    }
    .loader {
      text-align: center;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      position: relative;
    }
    .hex-ring {
      width: 100%;
      height: 100%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .status {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }
    .note {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 8px;
      min-height: 16px;
    }
    .note.warn {
      color: rgba(255, 196, 125, 0.9);
    }
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    .bar-container {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 1px;
      margin: 16px auto 0;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, rgba(100, 180, 255, 0.6), transparent);
      border-radius: 1px;
      animation: slide 1.5s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">
      <svg class="hex-ring" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 6L56 18V42L32 54L8 42V18L32 6Z"
              stroke="rgba(100,180,255,0.5)" stroke-width="2" fill="none"/>
        <circle cx="32" cy="8" r="4" fill="rgba(100,180,255,0.8)"/>
        <circle cx="52" cy="44" r="4" fill="rgba(100,180,255,0.8)"/>
        <circle cx="12" cy="44" r="4" fill="rgba(100,180,255,0.8)"/>
        <line x1="32" y1="8" x2="52" y2="44" stroke="rgba(100,180,255,0.3)" stroke-width="1"/>
        <line x1="52" y1="44" x2="12" y2="44" stroke="rgba(100,180,255,0.3)" stroke-width="1"/>
        <line x1="12" y1="44" x2="32" y2="8" stroke="rgba(100,180,255,0.3)" stroke-width="1"/>
        <circle cx="32" cy="32" r="3" fill="rgba(200,230,255,0.9)"/>
      </svg>
    </div>
    <div class="status"><span data-status>Starting daemon</span><span class="dots"></span></div>
    <div class="note" data-note>Preparing local services...</div>
    <div class="bar-container">
      <div class="bar"></div>
    </div>
  </div>
  <script>
    const statusEl = document.querySelector("[data-status]");
    const noteEl = document.querySelector("[data-note]");
    const checkpoints = [
      {
        atMs: 0,
        status: "Starting daemon",
        note: "Preparing local services...",
      },
      {
        atMs: 3500,
        status: "Loading dashboard",
        note: "Connecting to localhost:17173",
      },
      {
        atMs: 10000,
        status: "Still starting",
        note: "Large projects can take a bit longer on first run.",
      },
    ];
    const startedAt = Date.now();
    const tick = () => {
      const elapsed = Date.now() - startedAt;
      let current = checkpoints[0];
      for (const step of checkpoints) {
        if (elapsed >= step.atMs) current = step;
      }
      if (statusEl) statusEl.textContent = current.status;
      if (noteEl) {
        noteEl.textContent = current.note;
        if (elapsed >= 18000) {
          noteEl.classList.add("warn");
          noteEl.textContent =
            "Startup is delayed. If this persists, restart UCM Desktop.";
        }
      }
    };
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
