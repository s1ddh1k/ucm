<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 24px;
    }
    h1 { font-size: 18px; margin-bottom: 16px; color: #fff; }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      background: #1a1a2e;
      color: #7c8db5;
      margin-bottom: 16px;
    }
    .status.active { background: #1a2e1a; color: #7cb57c; }
    .status.done { background: #1a2e1a; color: #4caf50; }
    .status.failed { background: #2e1a1a; color: #b57c7c; }

    #config-form {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    #config-form label {
      display: block;
      font-size: 13px;
      color: #999;
      margin: 8px 0 4px;
    }
    #config-form input, #config-form select {
      width: 100%;
      padding: 6px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 14px;
    }
    #config-form .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    #config-form .checkbox-row input { width: auto; }
    button {
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 12px;
    }
    button:hover { background: #1d4ed8; }

    #log {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .entry { padding: 2px 0; }
    .entry.event { color: #7c8db5; }
    .entry.error { color: #b57c7c; }

    #approval {
      display: none;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
    }
    #approval p { margin-bottom: 8px; }
    #approval button { margin-right: 8px; }
    #approval button:last-child { background: #444; }
  </style>
</head>
<body>
  <h1>UCM</h1>
  <div class="status" id="status">idle</div>

  <div id="config-form">
    <label for="project-path">Project Path</label>
    <input id="project-path" type="text" placeholder="/path/to/project">

    <label for="provider">Provider</label>
    <select id="provider">
      <option value="claude">Claude</option>
      <option value="codex">Codex</option>
    </select>

    <label for="model">Model (optional)</label>
    <input id="model" type="text" placeholder="e.g. opus, o3-high">

    <label for="max-iterations">Max Iterations</label>
    <input id="max-iterations" type="number" value="10" min="1" max="50">

    <div class="checkbox-row">
      <input id="auto-approve" type="checkbox">
      <label for="auto-approve" style="margin:0">Auto-approve merge</label>
    </div>

    <button id="start-btn">Start</button>
  </div>

  <div id="approval"></div>
  <div id="log"></div>

  <script type="module" src="views://ui/index.js"></script>
</body>
</html>
